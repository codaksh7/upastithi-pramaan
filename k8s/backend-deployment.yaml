apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: default
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: upastithi-backend:latest   # change this after pushing to a registry
          imagePullPolicy: Never            # use Never for local Minikube builds
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: backend-secret       # pulls all 3 Supabase vars from the Secret
          readinessProbe:
            httpGet:
              path: /docs                  # FastAPI's built-in docs page — good health check
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
